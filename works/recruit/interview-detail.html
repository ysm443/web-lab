<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>インタビュー | RECRUIT</title><!-- JS で上書き -->
    <link rel="icon" href="./img/common/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;700&display=swap"
    />
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body>

    <!-- Sub-page Header -->
    <header class="subpage-header">
      <div class="subpage-header__inner">
        <a href="./interview-list.html" class="subpage-header__back" aria-label="一覧へ戻る">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="13" y1="8" x2="3" y2="8"/>
            <polyline points="7,4 3,8 7,12"/>
          </svg>
          一覧へ戻る
        </a>
        <a href="./" class="subpage-header__logo">
          <img src="./img/common/logo.svg" alt="RECRUIT" width="100" height="32" />
        </a>
      </div>
    </header>

    <main>
      <!-- interview-detail.js で描画 -->
      <article class="interview-post" id="interviewPost" aria-live="polite">
        <!-- ローディング中はスケルトンを表示 -->
        <div class="interview-post__inner">
          <div class="interview-post__skeleton-text"></div>
          <div class="interview-post__skeleton-text interview-post__skeleton-text--lg"></div>
          <div class="interview-post__hero interview-post__hero--skeleton"></div>
          <div class="interview-post__skeleton-text interview-post__skeleton-text--body"></div>
        </div>
      </article>
    </main>

    <footer class="subpage-footer">
      <div class="subpage-footer__inner">
        <a href="./" class="subpage-footer__logo">
          <img src="./img/common/logo-white.svg" alt="RECRUIT" width="80" height="26" />
        </a>
        <p class="subpage-footer__copy">
          <small>&copy; <span id="footerYear"></span> RECRUIT. All Rights Reserved.</small>
        </p>
      </div>
    </footer>

    <script src="./js/interview-detail.js"></script>
    <script>
      document.getElementById('footerYear').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
